<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="shortcut icon" href="shared/img/favicon.ico" type="image/x-icon" />
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm" crossorigin="anonymous"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- My sources -->
    <link rel="stylesheet" href="css/index.css" />
    <script src="js/clear-inputs.js" defer></script>
    <script src="js/password-visibility.js" defer></script>
</head>
<body>
    <header class="bg-gradient d-flex align-items-center">
        <img class="col-2" src="shared/img/ifba-logo.png" alt="Logo do IFBA de Jacobina">
        <h1 class="fw-bold col-7 ms-auto text-white">Accelockia</h1>
    </header>
    <main>
        <div class="d-flex flex-column align-items-center container-fluid">
            <div id="form-wrap" class="mt-5 py-3 px-4 col-4 rounded-4">
                <form action="login.php" method="post" autocomplete="on">
                    <h2 class="subtitle mb-5 text-center fs-2">Login</h2>
                    <div class="mb-3 input-group">
                        <input type="email" name="email-input" class="form-control form-control-lg" id="email-input" placeholder="E-mail" autocomplete="email">
                        <span id="email-icon-wrap" class="input-group-append input-group-text col-2 d-flex justify-content-center">
                            <i class="fa fa-envelope"></i>
                        </span>
                    </div>
                    <div class="mb-3 input-group">
                        <input type="password" name="password-input" id="password-input" class="form-control form-control-lg" placeholder="Senha">
                        <button type="button" id="password-visibility-button" class="input-group-append input-group-text col-2 d-flex justify-content-center">
                            <i id="password-visibility-icon" class="fa fa-eye-slash"></i>
                        </button>
                    </div>
                    <div class="d-flex justify-content-end">
                        <button id="login-button" class="btn btn-primary" type="submit">Entrar</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <footer class="d-flex flex-column align-items-center bg-gradient bg-black fixed-bottom py-1">
        <span class="text-white">&copy; Accelockia 2023 | Gabriel Cavalcante</span>
        <span class="text-white">accelockia@gmail.com</span>
    </footer>
</body>
</html>
