                <form action="register.php" method="post" autocomplete="on" class="mx-auto">
                    <!-- <h2 id="form-title" class="fw-bold fs-2">Cadastro</h2> -->
                    <legend class="mb-4 mt-0 fs-2 fw-bold">Cadastro</legend>
                    <hr class="border border-black mt-0 mb-4">
                    <!-- Full name, registration number and e-mail -->
                    <div class="d-flex justify-content-between">
                        <div id="fullname-input-wrap">
                            <label for="fullname-input" class="form-label mb-0">*Nome completo</label>
                            <input type="text" class="form-control form-control-sm" id="fullname-input" name="fullname-input" required autocomplete="username">
                        </div>
                        <div id="registrationnumber-input-wrap">
                            <label for="registrationnumber-input" class="form-label mb-0">*Número de matrícula</label>
                            <input type="text" class="form-control form-control-sm" id="registrationnumber-input" name="registrationnumber-input" required autocomplete="">
                        </div>
                        <div id="email-input-wrap">
                            <label for="email-input" class="form-label mb-0">*E-mail</label>
                            <input type="email" class="form-control form-control-sm" id="email-input" name="email-input" required autocomplete="email">
                        </div>
                    </div>
                    <!-- Tel, CEP and public place -->
                    <div class="d-flex justify-content-between mt-3">
                        <div id="tel-input-wrap">
                            <label for="tel-input" class="form-label mb-0">Telefone</label>
                            <input type="tel" class="form-control form-control-sm" id="tel-input" name="tel-input" autocomplete="tel">
                        </div>
                        <div id="cep-input-wrap">
                            <label for="cep-input" class="form-label mb-0">CEP</label>
                            <input type="text" class="form-control form-control-sm" id="cep-input" name="cep-input" autocomplete="">
                        </div>
                        <div id="publicplace-input-wrap">
                            <label for="publicplace-input" class="form-label mb-0">Logradouro</label>
                            <input type="text" class="form-control form-control-sm" id="publicplace-input" name="publicplace-input" autocomplete="">
                        </div>
                    </div>
                    <!-- Neighborhood, complement and city -->
                    <div class="d-flex justify-content-between mt-3">
                        <div id="neighborhood-input-wrap">
                            <label for="neighborhood-input" class="form-label mb-0">Bairro</label>
                            <input type="text" class="form-control form-control-sm" id="neighborhood-input" name="neighborhood-input" autocomplete="">
                        </div>
                        <div id="complement-input-wrap">
                            <label for="complement-input" class="form-label mb-0">Complemento</label>
                            <input type="text" class="form-control form-control-sm" id="complement-input" name="complement-input" autocomplete="">
                        </div>
                        <div id="city-input-wrap">
                            <label for="city-input" class="form-label mb-0">Cidade</label>
                            <input type="text" class="form-control form-control-sm" id="city-input" name="city-input" autocomplete="">
                        </div>
                    </div>
                    <!-- State, login and password -->
                    <div class="d-flex justify-content-between mt-3">
                        <div id="state-select-wrap">
                            <select id="state-select" class="form-select mt-4" aria-label="Slecione um estado">
                                <option selected>Slecione um estado</option>
                                <option value="acre">Acre</option>
                                <option value="alagoas">Alagoas</option>
                                <option value="amapa">Amapá</option>
                                <option value="amazonas">Amazonas</option>
                                <option value="bahia">Bahia</option>
                                <option value="ceara">Ceará</option>
                                <option value="distrito-federal">Distrito Federal</option>
                                <option value="espirito-santo">Espírito Santo</option>
                                <option value="goias">Goiás</option>
                                <option value="maranhao">Maranhão</option>
                                <option value="mato-grosso">Mato Grosso</option>
                                <option value="mato-grosso-do-sul">Mato Grosso do Sul</option>
                                <option value="minas-gerais">Minas Gerais</option>
                                <option value="para">Pará</option>
                                <option value="paraiba">Paraíba</option>
                                <option value="parana">Paraná</option>
                                <option value="pernambuco">Pernambuco</option>
                                <option value="piaui">Piauí</option>
                                <option value="rio-de-janeiro">Rio de Janeiro</option>
                                <option value="rio-grande-do-norte">Rio Grande do Norte</option>
                                <option value="rio-grande-do-sul">Rio Grande do Sul</option>
                                <option value="rondonia">Rondônia</option>
                                <option value="roraima">Roraima</option>
                                <option value="santa-catarina">Santa Catarina</option>
                                <option value="sao-paulo">São Paulo</option>
                                <option value="sergipe">Sergipe</option>
                                <option value="tocantins">Tocantins</option>
                              </select>
                        </div>
                        <div id="login-input-wrap" class="ms-4">
                            <label for="login-input" class="form-label mb-0">*Login</label>
                            <input type="text" class="form-control form-control-sm" name="login-input" id="login-input" required autocomplete="name">
                        </div>
                        <div id="password-input-wrap">
                            <label for="password-input" class="form-label mb-0">*Senha</label>
                            <input type="password" class="form-control form-control-sm" name="password-input" id="password-input" required>
                        </div>
                    </div>
                    <!-- Active, administrator and tag -->
                    <div class="d-flex justify-content-between mt-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="active-ckeckbox" checked>
                            <label class="form-check-label" for="active-ckeckbox">
                                Ativo
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="administrator-checkbox">
                            <label class="form-check-label" for="administrator-checkbox">
                                Administrador
                            </label>
                        </div>
                        <div id="tag-select-wrap">
                            <select id="tag-select" class="form-select" aria-label="Slecione uma tag">
                                <option selected>Slecione uma tag</option>
                            </select>
                        </div>
